version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: wbpk-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wbpk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: wbpk-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wbpk-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/wbpk_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=wbpk-super-secret-jwt-2026
      - ADMIN_USERNAME=WBPK
      - ADMIN_PASSWORD=PK78692
      - GOOGLE_DRIVE_API_KEY=${GOOGLE_DRIVE_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wbpk-worker
    restart: always
    command: ["npm", "run", "worker"]
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/wbpk_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FACE_SERVICE_URL=http://face-service:8000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - face-service

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: wbpk-face-service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wbpk-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: wbpk-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
