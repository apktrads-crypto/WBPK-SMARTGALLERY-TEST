events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       80;
        server_name  localhost;

        # Next.js Frontend
        location / {
            proxy_pass http://host.docker.internal:3000; # Use actual IP if not docker
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Node.js API Backend
        location /api/ {
            proxy_pass http://host.docker.internal:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Python Face Recognition API
        location /face-api/ {
            rewrite ^/face-api/(.*) /$1 break;
            proxy_pass http://host.docker.internal:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # High Performance Static File Serving
        location /uploads/ {
            alias C:/Users/PMP/Desktop/wbpk/uploads/;
            
            # Browser caching for 30 days
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            # CORS headers if needed for canvas drawings
            add_header Access-Control-Allow-Origin *;
        }
    }
}
